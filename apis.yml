aid: mendel-ai
name: Mendel AI
description: >-
  Mendel AI is a San Jose, California clinical AI company founded in 2017 by
  Dr. Karim Galil to streamline oncology research by organizing real-world
  data and accelerating clinical-trial workflows. Its flagship platform,
  Mendel Hypercube, pairs large language models with a clinician-built
  clinical knowledge hypergraph to add physician-like reasoning to LLMs
  operating over electronic health records, pathology reports, genomic data,
  clinician notes, claims, diagnostic data, and EDC submissions. Hypercube
  is offered as three productized experiences — Hypercube Cohort for
  patient cohort discovery (with funnel-style criteria analysis and direct
  integration to clinicaltrials.gov), Hypercube Analyst for AI-driven
  analysis of structured and unstructured real-world data, and Build Your
  Own Hypercube for custom clinical-data queries. The platform integrates
  with enterprise data warehouses (Databricks, Snowflake) and BI tools
  (Tableau, Qlik), and is available through the AWS Marketplace, Microsoft
  Azure Marketplace, and natively on the Snowflake AI Data Cloud. Mendel
  serves pharma, providers, payers, and research organizations including
  Quest Diagnostics, Boston Scientific, Gatehouse Bio, and the University
  of Pennsylvania, with published evidence in oncology trial prescreening.
  Mendel has no public developer portal, OpenAPI specification, SDK, or
  open-source GitHub repositories; integration is delivered through
  enterprise contracts and cloud-marketplace deployments.
